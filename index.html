<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe ERP 進銷存系統</title>
    <!-- Fonts: Inter for numbers, Noto Sans TC for Chinese -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <!-- Handsontable for spreadsheet editing -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css">
    <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
    <!-- Dexie for IndexedDB -->
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
    <!-- SheetJS for Excel Import/Export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- Chart.js for Reports -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Phosphor Icons for premium UI -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <i class="ph ph-cube"></i>
                <span>Vibe ERP</span>
            </div>
            <nav class="nav-links">
                <a href="#dashboard" class="nav-item active" data-view="dashboard">
                    <i class="ph ph-squares-four"></i> 總覽
                </a>
                <a href="#products" class="nav-item" data-view="products">
                    <i class="ph ph-codesandbox-logo"></i> 商品庫存
                </a>
                <a href="#purchases" class="nav-item" data-view="purchases">
                    <i class="ph ph-truck"></i> 進貨管理
                </a>
                <a href="#sales" class="nav-item" data-view="sales">
                    <i class="ph ph-shopping-cart"></i> 出貨管理
                </a>
                <a href="#suppliers" class="nav-item" data-view="suppliers">
                    <i class="ph ph-buildings"></i> 進貨廠商
                </a>
                <a href="#customers" class="nav-item" data-view="customers">
                    <i class="ph ph-users"></i> 客戶資料
                </a>
                <a href="#reports" class="nav-item" data-view="reports">
                    <i class="ph ph-chart-line-up"></i> 銷售報表
                </a>
                <a href="#spreadsheet" class="nav-item" data-view="spreadsheet">
                    <i class="ph ph-table"></i> 批次編輯 (Spreadsheet)
                </a>
                <a href="#settings" class="nav-item" data-view="settings">
                    <i class="ph ph-gear"></i> 系統資料
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <div class="page-title" id="page-title">總覽 Dashboard</div>
                <div class="actions">
                    <button class="btn btn-outline" id="btn-download-template">
                        <i class="ph ph-download-simple"></i> 下載 Excel 範本
                    </button>
                    <button class="btn btn-outline" id="btn-export">
                        <i class="ph ph-export"></i> 匯出本機資料
                    </button>
                    <label class="btn btn-primary" for="file-upload">
                        <i class="ph ph-upload-simple"></i> 匯入 Excel
                        <input type="file" id="file-upload" accept=".xls,.xlsx" style="display: none;">
                    </label>
                </div>
            </header>

            <div class="view-content" id="view-container">
                <!-- Views will be injected dynamically by JS -->
            </div>
        </main>
    </div>

    <!-- Templates for Views -->
    <template id="tpl-dashboard">
        <div class="dashboard-grid">
            <div class="stat-card glass-panel">
                <div class="stat-icon"><i class="ph ph-package"></i></div>
                <div class="stat-info">
                    <div class="stat-label">總商品數</div>
                    <div class="stat-value" id="stat-products">0</div>
                </div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-icon"><i class="ph ph-users"></i></div>
                <div class="stat-info">
                    <div class="stat-label">客戶總數</div>
                    <div class="stat-value" id="stat-customers">0</div>
                </div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-icon"><i class="ph ph-money"></i></div>
                <div class="stat-info">
                    <div class="stat-label">本月營業額</div>
                    <div class="stat-value" id="stat-revenue">$0</div>
                </div>
            </div>
            <div class="stat-card glass-panel">
                <div class="stat-icon warning"><i class="ph ph-warning"></i></div>
                <div class="stat-info">
                    <div class="stat-label">庫存不足預警</div>
                    <div class="stat-value" id="stat-low-stock">0 項</div>
                </div>
            </div>
        </div>
        <div class="dashboard-charts">
            <div class="chart-container glass-panel">
                <h3>近期銷售趨勢</h3>
                <canvas id="dashboard-chart-sales"></canvas>
            </div>
        </div>
    </template>

    <template id="tpl-products">
        <div class="glass-panel table-panel">
            <div class="panel-header">
                <h3>商品庫存清單</h3>
                <div class="panel-actions">
                    <button class="btn btn-sm btn-primary" onclick="app.showModal('product-modal')">新增商品</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>產品代碼</th>
                            <th>產品名稱</th>
                            <th>產品類別</th>
                            <th>進貨成本</th>
                            <th>預計售價</th>
                            <th>庫存量</th>
                            <th>供應商</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="products-tbody">
                        <tr>
                            <td colspan="7" class="text-center">載入中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="tpl-purchases">
        <div class="glass-panel table-panel">
            <div class="panel-header">
                <h3>進貨紀錄</h3>
                <div class="panel-actions">
                    <button class="btn btn-sm btn-primary" onclick="app.showModal('purchase-modal')">新增進貨</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>進貨單號</th>
                            <th>日期</th>
                            <th>廠商</th>
                            <th>產品</th>
                            <th>單位成本</th>
                            <th>數量</th>
                            <th>總金額</th>
                        </tr>
                    </thead>
                    <tbody id="purchases-tbody">
                        <tr>
                            <td colspan="7" class="text-center">載入中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="tpl-sales">
        <div class="glass-panel table-panel">
            <div class="panel-header">
                <h3>出貨紀錄</h3>
                <div class="panel-actions">
                    <button class="btn btn-sm btn-primary" onclick="app.showModal('sale-modal')">新增出貨</button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>出貨單號</th>
                            <th>日期</th>
                            <th>客戶</th>
                            <th>產品</th>
                            <th>售價單價</th>
                            <th>數量</th>
                            <th>總金額</th>
                        </tr>
                    </thead>
                    <tbody id="sales-tbody">
                        <tr>
                            <td colspan="7" class="text-center">載入中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="tpl-suppliers">
        <div class="glass-panel table-panel">
            <div class="panel-header">
                <h3>進貨廠商清單</h3>
            </div>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>廠商編號</th>
                            <th>廠商名稱</th>
                            <th>聯絡人</th>
                            <th>電話</th>
                        </tr>
                    </thead>
                    <tbody id="suppliers-tbody">
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="tpl-customers">
        <div class="glass-panel table-panel">
            <div class="panel-header">
                <h3>客戶資料清單</h3>
            </div>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>客戶編號</th>
                            <th>客戶名稱</th>
                            <th>電話</th>
                            <th>地址</th>
                        </tr>
                    </thead>
                    <tbody id="customers-tbody">
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="tpl-reports">
        <div class="glass-panel table-panel">
            <div class="panel-header">
                <h3>各客戶出貨查詢 & 銷售報表</h3>
                <div class="filter-bar">
                    <select id="report-customer-select" class="form-control">
                        <option value="">所有客戶</option>
                    </select>
                </div>
            </div>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>出貨單號</th>
                            <th>日期</th>
                            <th>客戶</th>
                            <th>產品</th>
                            <th>售價單價</th>
                            <th>數量</th>
                            <th>總額</th>
                        </tr>
                    </thead>
                    <tbody id="reports-tbody">
                    </tbody>
                </table>
                <div class="report-summary">
                    <div class="summary-item">查詢總營業額: <span id="report-total" class="amount">$0</span></div>
                </div>
            </div>
        </div>
    </template>

    <template id="tpl-spreadsheet">
        <div class="glass-panel spreadsheet-panel">
            <div class="panel-header">
                <div class="header-main">
                    <h3>批次編輯模式 (Spreadsheet Mode)</h3>
                    <p class="text-muted">您可以直接複製貼上 (Ctrl+C / Ctrl+V) 大量資料，編輯完成後請點擊「提交更新」。</p>
                </div>
                <div class="spreadsheet-actions">
                    <select id="spreadsheet-select-table" class="form-control"
                        style="width: auto; display: inline-block;">
                        <option value="products">商品庫存</option>
                        <option value="suppliers">進貨廠商</option>
                        <option value="customers">客戶資料</option>
                    </select>
                    <button class="btn btn-primary" id="btn-spreadsheet-save">提交更新</button>
                    <button class="btn btn-outline" id="btn-spreadsheet-refresh">重新載入</button>
                </div>
            </div>
            <div id="spreadsheet-grid" class="spreadsheet-container"></div>
        </div>
    </template>

    <template id="tpl-settings">
        <div class="glass-panel">
            <h3>系統資訊</h3>
            <p>這是一套純前端的進銷存系統，所有的資料都儲存在您的瀏覽器中 (IndexedDB)。因此非常快速且安全。</p>
            <p><strong>請定期使用右上角的「匯出本機資料」備份您的資料，以免因為清除瀏覽器快取而遺失資料。</strong></p>
            <p>如果您要更換電腦，請先在新設備上下載範本，用您備份的資料貼上並匯入系統中即可還原。</p>

            <div class="danger-zone"
                style="margin-top: 30px; border: 1px solid #ef4444; padding: 20px; border-radius: 8px;">
                <h4 style="color: #ef4444; margin-top: 0;">危險操作</h4>
                <p>清除所有本機資料後無法還原。</p>
                <button class="btn" style="background: #ef4444; color: white;"
                    onclick="app.clearDatabase()">清除所有本機資料</button>
            </div>
        </div>
    </template>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay" style="display: none;">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h3 id="modal-title">新增</h3>
                <button class="icon-btn" onclick="app.hideModal()"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Injected form -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="app.hideModal()">取消</button>
                <button class="btn btn-primary" id="modal-save-btn">儲存</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">操作成功</div>

    <!-- App Logic -->
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
